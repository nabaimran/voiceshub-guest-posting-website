     <li>

       ☾
      </button>
     </li>
    </ul>
    <button class="nav__burger" id="burgerBtn">
     <span>
     </span>
     <span>

     <span>

   </div>
   <div class="mobile-menu" id="mobileMenu">
    <a href="index.html">

  <header class="page-hero dashboard-hero">
   <div>
    <p class="eyebrow">
     Admin dashboard
    </p>
    <h1>
     Review, publish and
     <em>
      manage
     </em>
     .
    </h1>
    <p>
     Frontend demo dashboard using localStorage. Password:
     <strong>
      admin123
     </strong>
    </p>
   </div>
  </header>
  <main class="section">
   <div class="container">
    <div class="form-card small-card" id="loginBox">
     <h2>
      Admin login
     </h2>
     <input id="adminPassword" placeholder="Enter password" type="password"/>
     <button class="btn btn--primary" id="adminLogin">
      Login
     </button>
     <p id="loginMsg">
     </p>
    </div>
    <div class="hidden" id="adminPanel">
     <div class="dashboard-stats">
      <div>
       <strong id="dashTotal">
        0
       </strong>
       <span>
        Total
       </span>
      </div>
      <div>
       <strong id="dashPending">
        0
       </strong>
       <span>
        Pending
       </span>
      </div>
      <div>
       <strong id="dashPublished">
        0
       </strong>
       <span>
        Published
       </span>
      </div>
     </div>
     <div class="tabs">
      <button class="tab active" data-status="pending">
       Pending
      </button>
      <button class="tab" data-status="published">
       Published
      </button>
      <button class="tab" data-status="rejected">
       Rejected
      </button>
     </div>
     <div class="admin-list" id="adminPosts">
     </div>
    </div>
   </div>
  </main>
  <footer class="footer">
   <div class="container">
    <p>
     © VoicesHub.
    </p>
   </div>
  </footer>
  <script src="script.js">
  </script>
