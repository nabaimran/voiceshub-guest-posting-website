     </em>

     <label>
      Email
      <input id="contactEmail" required="" type="email"/>

     <label>
      Message
      <textarea id="contactMessage" required="" rows="7"></textarea>
     </label>
     <button class="btn btn--primary">
      Send Message
     </button>
     <p class="success-msg" id="contactMsg">
     </p>
    </form>
   </div>
